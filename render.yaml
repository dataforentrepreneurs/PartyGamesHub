services:
  # Main Backend Service (serving API + Frontends)
  - type: web
    name: party-games-hub
    env: python
    plan: free # <--- ENSURES THE SERVER IS FREE
    buildCommand: |
      pip install -r Server/requirements.txt
      cd Games/Launcher && npm install && npm run build && cd ../..
      cd Games/DrawJudge && npm install && npm run build && cd ../..
    startCommand: |
      cd Server
      python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: party-games-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: ENVIRONMENT
        value: production
      - key: LAUNCHER_DIST
        value: /opt/render/project/src/Games/Launcher/dist
      - key: DRAWJUDGE_DIST
        value: /opt/render/project/src/Games/DrawJudge/dist

  # Redis instance for persistence
  - type: redis
    name: party-games-redis
    plan: free # <--- ENSURES REDIS IS FREE
    ipAllowList: [] 
